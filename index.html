<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Fernando Araujo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .menu-card { transition: all 0.2s ease-in-out; }
        .menu-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-10 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto">
        
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Gestión de Producción</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[4px] mt-1">Fernando Araujo</p>
            <div class="h-1 w-12 bg-slate-400 mx-auto mt-3 rounded-full"></div>
        </header>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            
            <a href="https://loep1039.github.io/Pan-_Campesino/" class="menu-card bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 flex flex-col items-center text-center hover:border-emerald-500 hover:shadow-md">
                <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600 mb-3 group-hover:bg-emerald-500 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15.5a5 5 0 01-7.41 4.38 4.48 4.48 0 01-7.18 0 5 5 0 01-7.41-4.38V12s0-8 11-8 11 8 11 8v3.5z" />
                    </svg>
                </div>
                <span class="text-[11px] font-black uppercase text-emerald-800 leading-tight">Pan<br>Campesino</span>
            </a>

            <a href="https://loep1039.github.io/Pan_Frances/" class="menu-card bg-white p-6 rounded-3xl shadow-sm border border-indigo-100 flex flex-col items-center text-center hover:border-indigo-500 hover:shadow-md">
                <div class="p-4 bg-indigo-50 rounded-2xl text-indigo-600 mb-3 group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <span class="text-[11px] font-black uppercase text-indigo-800 leading-tight">Pan<br>Francés</span>
            </a>

            <a href="https://loep1039.github.io/Pan_Pinita/" class="menu-card bg-white p-6 rounded-3xl shadow-sm border border-rose-100 flex flex-col items-center text-center hover:border-rose-500 hover:shadow-md">
                <div class="p-4 bg-rose-50 rounded-2xl text-rose-600 mb-3 group-hover:bg-rose-500 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                    </svg>
                </div>
                <span class="text-[11px] font-black uppercase text-rose-800 leading-tight">Pan<br>Piñita</span>
            </a>

            <a href="https://loep1039.github.io/Torta_De_Naranja/" class="menu-card bg-white p-6 rounded-3xl shadow-sm border border-orange-100 flex flex-col items-center text-center hover:border-orange-500 hover:shadow-md">
                <div class="p-4 bg-orange-50 rounded-2xl text-orange-600 mb-3 group-hover:bg-orange-500 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <span class="text-[11px] font-black uppercase text-orange-800 leading-tight">Torta<br>Naranja</span>
            </a>

            <div class="menu-card bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-center opacity-50">
                <div class="p-4 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                </div>
                <span class="text-[10px] font-bold uppercase text-slate-400">Nuevo<br>Producto</span>
            </div>

        </div>

        <footer class="mt-12 text-center">
            <p class="text-[9px] text-slate-400 uppercase tracking-[2px]">Sistema de Panificación Profesional v2.0</p>
        </footer>

    </div>
</body>
</html>
